<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Rental | Booking Confirmation</title>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
            background-color: #f7f7f7;
        }

        h1, h2 {
            text-align: center;
        }

        .booking-container {
            max-width: 400px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.2);
        }

        .field-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: #28a745;
            border: none;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Booking Confirmation</h1>
    <div class="booking-container">

        <!-- License / Rider Details -->
        <h2>License Details</h2>
        <form id="bookingForm">
            <div class="field-group">
                <label for="riderName">Rider Name</label>
                <input type="text" id="riderName" placeholder="Full Name" required>
            </div>

            <div class="field-group">
                <label for="licenseNumber">License Number</label>
                <input type="text" id="licenseNumber" placeholder="License ID" required>
            </div>

            <div class="field-group">
                <label for="licenseExpiry">License Expiry Date</label>
                <input type="date" id="licenseExpiry" required>
            </div>

            <!-- Payment Options -->
            <h2>Payment Method</h2>
            <div class="field-group">
                <label for="paymentMethod">Choose Payment</label>
                <select id="paymentMethod" required>
                    <option value="">--Select Payment--</option>
                    <option value="card">Card Payment</option>
                    <option value="wallet">Wallet Payment</option>
                    <option value="bank">Bank Transfer</option>
                    <option value="qr">Direct QR</option>
                </select>
            </div>

            <button type="submit">Confirm Booking & Pay</button>
        </form>

    </div>

    <script src="booking.js"></script>

</body>
</html>
