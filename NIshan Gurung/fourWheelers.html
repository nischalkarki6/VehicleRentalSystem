<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Rental | Four Wheelers</title>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
            background-color: #f7f7f7;
        }

        h1 {
            text-align: center;
        }

        .vehicle-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .vehicle-card {
            background-color: #fff;
            padding: 15px;
            width: 220px;
            border-radius: 8px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.2);
            text-align: center;
        }

        .vehicle-card img {
            width: 100%;
            border-radius: 8px;
        }

        .vehicle-card button {
            margin-top: 10px;
            padding: 8px 12px;
            cursor: pointer;
            background-color: #28a745;
            border: none;
            color: #fff;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>Available Four Wheelers</h1>

    <div class="vehicle-list" id="vehicleList">
        <!-- Vehicle cards will be added here by JS -->
    </div>

    <script src="fourWheelers.js"></script>

</body>
</html>
