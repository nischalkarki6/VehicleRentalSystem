<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in - CARCODEMANDU</title>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <!-- Back to Home -->
    <a href="index.html" style="position:absolute; top:30px; left:30px; font-size:1.5rem; color:var(--text-white);">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <div class="auth-card">
        <div class="auth-header">
            <div class="logo mb-2">CARCODEMANDU</div>
            <h2>Premium Vehicle Management</h2>
            <p class="auth-sub">Access your exclusive garage and inventory analytics.</p>
        </div>
        
        <form>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@domain.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <div style="text-align:right; margin-bottom:20px;">
                <a href="#" class="auth-sub" style="font-size:0.8rem;">Forgot Password?</a>
            </div>
            <button type="submit" class="btn btn-primary btn-block">SIGN IN</button>
        </form>
        
        <div class="auth-footer">
            Don't have an account? <a href="signup.html">Sign Up</a>
        </div>
    </div>

</body>
</html>
