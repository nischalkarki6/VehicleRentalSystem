<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up - CARCODEMANDU</title>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <!-- Back to Home -->
    <a href="index.html" style="position:absolute; top:30px; left:30px; font-size:1.5rem; color:var(--text-white);">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <div class="auth-card" style="max-width:600px;">
        <div class="auth-header">
            <div class="logo mb-2">CARCODEMANDU</div>
            <h2>Create an account</h2>
            <p class="auth-sub">Start your journey with premium access today and experience architectural mobility.</p>
        </div>
        
        <form>
            <div class="form-row">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Ram" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" placeholder="+977 980 0000000" required>
                </div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block mt-2">SIGN UP</button>
            <p class="text-center text-muted mt-2" style="font-size:0.8rem;">By continuing, you agree to CarCodemandu's Terms of Service and Privacy Policy.</p>
        </form>
        
        <div class="auth-footer">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

</body>
</html>
